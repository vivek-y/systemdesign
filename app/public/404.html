<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Interview Prep</title>
    <script>
      // GitHub Pages 404 redirect trick for SPAs with HashRouter.
      // Redirect any 404 back to the root so HashRouter can handle it.
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 2).join('/') +
        '/?p=' + encodeURIComponent(l.pathname.slice(1) + l.search) +
        (l.hash || '')
      );
    </script>
  </head>
  <body></body>
</html>
